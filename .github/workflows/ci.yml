name: CI

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint || echo "eslint not configured"
      - name: Test
        run: npm run test || echo "vitest not configured"

  deploy-pages:
    name: deploy-pages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Debug: show workspace
        run: |
          echo "PWD: $(pwd)"
          echo "List root:" && ls -la
          echo "List repo folder:" && ls -la ${{ github.workspace }} || true
          echo "List dist:" && ls -la ./dist || true
      - name: Deploy to gh-pages (peaceiris)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
