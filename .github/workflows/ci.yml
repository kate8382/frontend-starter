name: CI

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NODE_VERSION: '24.18.0'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Override Node version (e.g. 18 or 18.16.0)'
        required: false
        default: ''

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Determine Node version
        id: determine_node
        run: |
          # Priority: workflow_dispatch input -> package.json engines.node -> workflow env default
          NV=""
          if [ -n "${{ github.event.inputs.node_version }}" ]; then
            NV="${{ github.event.inputs.node_version }}"
            echo "Using node version from workflow input: $NV"
          elif [ -f package.json ]; then
            NV=$(grep -m1 '"node"' package.json | sed -E 's/.*"node"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/') || true
            if [ -n "$NV" ]; then
              echo "Detected engines.node=$NV"
            fi
          fi
          if [ -z "$NV" ]; then
            NV="${{ env.NODE_VERSION }}"
            echo "Falling back to workflow default: $NV"
          fi
          echo "node_version=$NV" >> $GITHUB_OUTPUT
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.determine_node.outputs.node_version }}
      - name: Install deps
        working-directory: ${{ github.workspace }}
        run: npm ci
      - name: Lint
        run: npm run lint || echo "eslint not configured"
      - name: Test
        run: npm run test || echo "vitest not configured"

  deploy-pages:
    name: deploy-pages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine Node version
        id: determine_node
        run: |
          # Priority: workflow_dispatch input -> package.json engines.node -> workflow env default
          NV=""
          if [ -n "${{ github.event.inputs.node_version }}" ]; then
            NV="${{ github.event.inputs.node_version }}"
            echo "Using node version from workflow input: $NV"
          elif [ -f package.json ]; then
            NV=$(grep -m1 '"node"' package.json | sed -E 's/.*"node"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/') || true
            if [ -n "$NV" ]; then
              echo "Detected engines.node=$NV"
            fi
          fi
          if [ -z "$NV" ]; then
            NV="${{ env.NODE_VERSION }}"
            echo "Falling back to workflow default: $NV"
          fi
          echo "node_version=$NV" >> $GITHUB_OUTPUT
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.determine_node.outputs.node_version }}
      - name: Install deps
        working-directory: ${{ github.workspace }}
        run: npm ci
      - name: Build
        working-directory: ${{ github.workspace }}
        run: npm run build
      - name: 'Debug: show workspace'
        run: |
          echo "PWD: $(pwd)"
          echo "List root:" && ls -la
          echo "List repo folder:" && ls -la ${{ github.workspace }} || true
          echo "List dist:" && ls -la ./dist || true
      - name: Push dist to gh-pages (direct push)
        run: |
          set -eux
          REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          CLONE_DIR=$(mktemp -d)
          echo "Cloning gh-pages branch..."
          if git ls-remote --exit-code --heads "$REPO" gh-pages; then
            git clone --depth=1 --branch gh-pages "$REPO" "$CLONE_DIR"
          else
            git clone "$REPO" "$CLONE_DIR"
            cd "$CLONE_DIR"
            git checkout --orphan gh-pages
            cd -
          fi
          echo "Preparing publish dir"
          rm -rf "$CLONE_DIR"/* || true
          cp -a ${{ github.workspace }}/dist/. "$CLONE_DIR"/ || true
          cd "$CLONE_DIR"
          git add --all
          if git diff --staged --quiet; then
            echo "No changes to deploy to gh-pages"
          else
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git commit -m "deploy (direct push): ${{ github.sha }}"
            git push "$REPO" HEAD:gh-pages
          fi
        shell: bash
      - name: Deploy to gh-pages (peaceiris)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          clean: true
